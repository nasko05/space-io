AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SpaceIO Hearth -- single-instance deployment.
  Resources: one EC2 instance, one security group, a small root volume,
  a separate encrypted EBS data volume for the space, and one Elastic IP.
  Total monthly cost ~$4 (t4g.nano in us-east-1, on-demand) plus EBS storage.
  No load balancer, no Route53, no certificates.

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access.

  AllowedCidr:
    Type: String
    Description: >
      CIDR allowed to reach SSH (22) and Hearth (7777). Restrict to your own
      IP (e.g. 203.0.113.5/32). No default -- you must pass one explicitly.
      0.0.0.0/0 publishes the vault (and the passphrase in cleartext) to the
      entire internet -- never do this; supply your /32 instead.
    AllowedPattern: '^(?:\d{1,3}\.){3}\d{1,3}/\d{1,2}$'

  InstanceType:
    Type: String
    Default: t4g.nano
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small
      - t4g.medium
      - t4g.large
      - t4g.xlarge
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
    Description: t4g.* (ARM) is cheapest; t3.* (x86) if you need x86.

  DataVolumeGiB:
    Type: Number
    Default: 8
    MinValue: 4
    MaxValue: 200
    Description: Size of the encrypted data volume (gp3, attached at /data).

  RepositoryUrl:
    Type: String
    Default: https://github.com/nasko05/space-io.git
    Description: Git URL the instance clones from on first boot.

  RepositoryRef:
    Type: String
    Default: main
    Description: Branch or tag to check out.

Conditions:
  UseArm: !Or
    - !Equals [!Ref InstanceType, t4g.nano]
    - !Equals [!Ref InstanceType, t4g.micro]
    - !Equals [!Ref InstanceType, t4g.small]
    - !Equals [!Ref InstanceType, t4g.medium]
    - !Equals [!Ref InstanceType, t4g.large]
    - !Equals [!Ref InstanceType, t4g.xlarge]

Resources:
  HearthSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SpaceIO Hearth -- SSH + Hearth web port
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 7777
          ToPort: 7777
          CidrIp: !Ref AllowedCidr
          Description: Hearth (HTTP -- runs in cleartext on port 7777)
      Tags:
        - Key: Name
          Value: hearth-sg

  # The encrypted /data volume lives on its own EBS device so a stack delete
  # can drop the instance + root volume but preserve the space (DeletionPolicy:
  # Retain). 8 GiB by default; tune with the DataVolumeGiB parameter.
  HearthDataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt HearthInstance.AvailabilityZone
      Size: !Ref DataVolumeGiB
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: hearth-data

  HearthDataAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref HearthInstance
      VolumeId: !Ref HearthDataVolume

  HearthInstance:
    Type: AWS::EC2::Instance
    Properties:
      # Always resolves to the latest Amazon Linux 2023 AMI in the deploying
      # region -- no static map to keep up to date.
      ImageId: !If
        - UseArm
        - '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
        - '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref HearthSecurityGroup
      BlockDeviceMappings:
        # Modest root volume for the OS and the built binary. Encrypted at
        # rest; deleted with the instance because everything user-touched
        # lives on /data.
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/hearth-bootstrap.log) 2>&1

          dnf -y update
          dnf -y install git gcc gcc-c++ make openssl-devel nodejs

          # Wait for the data volume to attach and format/mount it.
          DATA_DEV=""
          for _ in $(seq 1 30); do
            for cand in /dev/sdf /dev/xvdf /dev/nvme1n1; do
              if [ -b "$cand" ]; then DATA_DEV="$cand"; break; fi
            done
            [ -n "$DATA_DEV" ] && break
            sleep 2
          done
          if [ -z "$DATA_DEV" ]; then
            echo "data volume never appeared" >&2
            exit 1
          fi
          if ! blkid "$DATA_DEV" >/dev/null 2>&1; then
            mkfs.xfs -L hearth-data "$DATA_DEV"
          fi
          mkdir -p /data
          echo "LABEL=hearth-data /data xfs defaults,nofail 0 2" >> /etc/fstab
          mount /data || mount LABEL=hearth-data /data

          # Rust toolchain (system-wide).
          export RUSTUP_HOME=/opt/rust
          export CARGO_HOME=/opt/cargo
          mkdir -p "$RUSTUP_HOME" "$CARGO_HOME"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --no-modify-path
          ln -sf /opt/cargo/bin/cargo /usr/local/bin/cargo
          ln -sf /opt/cargo/bin/rustc /usr/local/bin/rustc

          # Clone + build.
          mkdir -p /opt/space-io
          chown ec2-user:ec2-user /opt/space-io
          sudo -u ec2-user git clone --branch ${RepositoryRef} ${RepositoryUrl} /opt/space-io
          cd /opt/space-io
          sudo -u ec2-user bash -c 'cd web && npm install && npm run build'
          sudo -u ec2-user bash -c 'PATH=/opt/cargo/bin:$PATH cargo build --release'

          chown -R ec2-user:ec2-user /data
          ln -sfn /data /opt/space-io/data

          cat > /etc/systemd/system/hearth.service <<EOF
          [Unit]
          Description=SpaceIO Hearth
          After=network-online.target data.mount
          Wants=network-online.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/opt/space-io
          # Cookies are flagged Secure by default; opt out for local plain-HTTP
          # only. This deploy serves plain HTTP, so we leave that opt-out off
          # and let the operator front the host with TLS if they need it.
          Environment=HEARTH_INSECURE_COOKIES=1
          ExecStart=/opt/space-io/target/release/hearth serve --space-dir /data --listen 0.0.0.0:7777
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          # `hearth serve` tolerates an empty space-dir -- the browser-side
          # registration page (POST /api/auth/init) creates the first user
          # on first connect. So we enable + start the unit immediately;
          # no SSH-and-init dance needed.
          systemctl enable --now hearth.service
      Tags:
        - Key: Name
          Value: hearth

  HearthEip:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref HearthInstance
      Tags:
        - Key: Name
          Value: hearth-eip

Outputs:
  PublicAddress:
    Description: Static IP for SSH + Hearth.
    Value: !Ref HearthEip

  SshCommand:
    Description: Copy-paste to SSH in.
    Value: !Sub ssh -i ${KeyPairName}.pem ec2-user@${HearthEip}

  HearthUrl:
    Description: Open in a browser; the first connect shows the registration page.
    Value: !Sub http://${HearthEip}:7777
